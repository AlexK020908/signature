name: Deploy forwarder to EC2

# CI/CD for telegram-discord-forwarder.
# Runs on a SELF-HOSTED GitHub Actions runner installed on the EC2 box, so the
# job executes locally on the server — no SSH, no connection secrets. All deploy
# logic + the systemd unit live in telegram-discord-forwarder/.cicd/.
#
# On every push to main that touches the app:
#   1. syntax-check the code,
#   2. sync the checkout into the runtime dir (~/telegram-discord-forwarder),
#      preserving the live .session login + .env,
#   3. build .env from GitHub Secrets (.cicd/build-env.sh),
#   4. install deps + (re)start the systemd service (.cicd/deploy.sh),
#   5. confirm it's running (.cicd/health-check.sh).
#
# See telegram-discord-forwarder/.cicd/README.md for the secret list + the
# one-time runner install on the box.

on:
  push:
    branches: [main]
    paths:
      - "telegram-discord-forwarder/**"
      - ".github/workflows/deploy-forwarder.yml"
  workflow_dispatch: {} # allow manual "Run workflow" from the Actions tab

concurrency:
  group: deploy-forwarder
  cancel-in-progress: false # never interrupt a deploy mid-flight

jobs:
  deploy:
    runs-on: [self-hosted, linux] # the runner installed on your EC2 box
    env:
      APP_NAME: telegram-discord-forwarder
    steps:
      - uses: actions/checkout@v4

      - name: Syntax check
        run: python3 -m py_compile "$APP_NAME/forwarder.py"

      - name: Ensure prerequisites
        run: |
          # Works on dnf (Amazon Linux 2023) and apt (Ubuntu).
          if command -v rsync >/dev/null 2>&1 && python3 -m venv --help >/dev/null 2>&1; then
            exit 0
          fi
          if command -v dnf >/dev/null 2>&1; then
            sudo dnf install -y -q python3 python3-pip rsync
          else
            sudo apt-get update -qq && sudo apt-get install -y -qq python3-venv rsync
          fi

      - name: Sync code into runtime dir
        run: |
          APP_DIR="$HOME/$APP_NAME"
          mkdir -p "$APP_DIR"
          # Local rsync (same machine). --delete keeps it clean, but rsync
          # protects --exclude'd paths from deletion, so the live .env and the
          # *.session Telegram login survive every deploy.
          rsync -a --delete \
            --exclude '.env' \
            --exclude '*.session' \
            --exclude '*.session-journal' \
            --exclude 'venv/' \
            --exclude '__pycache__/' \
            --exclude '.git/' \
            --exclude 'forwarder.log' \
            "$APP_NAME/" "$APP_DIR/"

      - name: Build .env from secrets
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_AUTH_CHANNEL_ID: ${{ secrets.DISCORD_AUTH_CHANNEL_ID }}
          DISCORD_OWNER_ID: ${{ secrets.DISCORD_OWNER_ID }}
          # Optional non-secret tuning via repo Variables (fall back to defaults).
          DISCORD_MENTION: ${{ vars.DISCORD_MENTION }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          FORWARD_LAST_ON_START: ${{ vars.FORWARD_LAST_ON_START }}
          FORWARD_LAST_COUNT: ${{ vars.FORWARD_LAST_COUNT }}
        run: bash "$HOME/$APP_NAME/.cicd/build-env.sh" "$HOME/$APP_NAME/.env"

      - name: Install deps and restart service
        run: bash "$HOME/$APP_NAME/.cicd/deploy.sh"

      - name: Health check
        run: bash "$HOME/$APP_NAME/.cicd/health-check.sh"
